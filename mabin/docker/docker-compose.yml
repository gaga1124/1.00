version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: college_oa_db
    environment:
      MYSQL_DATABASE: college_oa
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_USER: ${DB_USER:-college_oa}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - college_oa_network

  redis:
    image: redis:7.0-alpine
    container_name: college_oa_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - college_oa_network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: college_oa_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ../backend:/app
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DB_HOST=db
      - DB_NAME=college_oa
      - DB_USER=college_oa
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - db
      - redis
    networks:
      - college_oa_network

  nginx:
    image: nginx:alpine
    container_name: college_oa_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - backend_media:/var/www/media
      - backend_static:/var/www/static
    depends_on:
      - backend
    networks:
      - college_oa_network

volumes:
  mysql_data:
  redis_data:
  backend_media:
  backend_static:

networks:
  college_oa_network:
    driver: bridge
